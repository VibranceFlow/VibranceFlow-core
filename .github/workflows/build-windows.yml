name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      # Documentation-only pushes should not rebuild binaries (use workflow_dispatch when needed).
      - "**/*.md"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      VIBRANCEFLOW_VERSION: "1.0.0"
      VIBRANCEFLOW_COMPANY: "VibranceFlow"
      VIBRANCEFLOW_PRODUCT: "VibranceFlow"
      VIBRANCEFLOW_FILE_DESCRIPTION: "Per-game color and audio profile switcher for Windows"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tooling
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install poetry nuitka

      - name: Install project dependencies
        shell: pwsh
        run: |
          poetry install --with packaging

      - name: Build onefile Windows executable
        shell: pwsh
        run: |
          poetry run python -m nuitka `
            --onefile `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --output-dir=dist `
            --output-filename=VibranceFlow `
            --windows-company-name="$env:VIBRANCEFLOW_COMPANY" `
            --windows-product-name="$env:VIBRANCEFLOW_PRODUCT" `
            --windows-file-description="$env:VIBRANCEFLOW_FILE_DESCRIPTION" `
            --windows-product-version="$env:VIBRANCEFLOW_VERSION" `
            --windows-file-version="$env:VIBRANCEFLOW_VERSION" `
            --windows-icon-from-ico=ui/Logos/ICO/logo.ico `
            --include-package=pycaw `
            --include-package=comtypes `
            --nofollow-import-to=comtypes.test,pulsectl `
            gui_main.py

      - name: Generate executable SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/VibranceFlow.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  VibranceFlow.exe" | Out-File -FilePath "dist/VibranceFlow.exe.sha256" -Encoding ascii

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibranceFlow-core-windows-exe
          path: |
            dist/VibranceFlow.exe
            dist/VibranceFlow.exe.sha256
          if-no-files-found: error
