name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      # Documentation-only pushes should not rebuild binaries (use workflow_dispatch when needed).
      - "**/*.md"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      VIBRANCEFLOW_VERSION: "1.1.0"
      VIBRANCEFLOW_COMPANY: "VibranceFlow"
      VIBRANCEFLOW_PRODUCT: "VibranceFlow"
      VIBRANCEFLOW_FILE_DESCRIPTION: "Per-game color and audio profile switcher for Windows"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        shell: pwsh
        run: python -m pip install --upgrade pip poetry

      - name: Install project dependencies
        shell: pwsh
        run: poetry install --with packaging

      - name: Protocol v1 guard
        shell: pwsh
        run: poetry run python scripts/verify_protocol_v1.py

      - name: Remote boot smoke test (dev)
        shell: pwsh
        run: |
          poetry run python scripts/test_remote_boot.py
          poetry run python scripts/test_prepare_pairing.py

      - name: Build onefile Windows executable
        shell: pwsh
        run: .\packaging\build_windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibranceFlow-core-windows-exe
          path: |
            dist/VibranceFlow.exe
            dist/VibranceFlow.exe.sha256
          if-no-files-found: error
