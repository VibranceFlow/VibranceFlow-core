name: Release Windows EXE

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v1.0.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      VIBRANCEFLOW_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      VIBRANCEFLOW_COMPANY: "VibranceFlow"
      VIBRANCEFLOW_PRODUCT: "VibranceFlow"
      VIBRANCEFLOW_FILE_DESCRIPTION: "Per-game color and audio profile switcher for Windows"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        shell: pwsh
        run: python -m pip install --upgrade pip poetry

      - name: Install project dependencies
        shell: pwsh
        run: poetry install --with packaging

      - name: Protocol v1 guard
        shell: pwsh
        run: poetry run python scripts/verify_protocol_v1.py

      - name: Remote boot smoke test (dev)
        shell: pwsh
        run: |
          poetry run python scripts/test_remote_boot.py
          poetry run python scripts/test_prepare_pairing.py

      - name: Normalize release version metadata
        shell: pwsh
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          if ($tag -match '^v(.+)$') {
            $env:VIBRANCEFLOW_VERSION = $Matches[1]
          } else {
            $env:VIBRANCEFLOW_VERSION = $tag
          }
          "VIBRANCEFLOW_VERSION=$($env:VIBRANCEFLOW_VERSION)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build onefile Windows executable
        shell: pwsh
        run: .\packaging\build_windows.ps1

      - name: Read SHA256 for release notes
        id: hash
        shell: pwsh
        run: |
          $line = Get-Content "dist/VibranceFlow.exe.sha256" -Raw
          $hash = ($line -split '\s+')[0]
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          name: VibranceFlow ${{ env.VIBRANCEFLOW_VERSION }} (Windows)
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## Integrity

            Download **both** files from this release and verify the hash before running:

            ```
            SHA256: ${{ steps.hash.outputs.sha256 }}
            ```

            ```powershell
            Get-FileHash ".\VibranceFlow.exe" -Algorithm SHA256
            ```

            The output must match `VibranceFlow.exe.sha256`.

            ## Antivirus / SmartScreen

            This build is distributed without a commercial code-signing certificate. See [docs/FALSE_POSITIVE_RUNBOOK.md](docs/FALSE_POSITIVE_RUNBOOK.md) and the README security section if Windows Defender or SmartScreen flags the file.

            ## Mobile companion

            Pair over LAN with a VibranceFlow-mobile APK built for protocol v1 (port 8765).
          files: |
            dist/VibranceFlow.exe
            dist/VibranceFlow.exe.sha256
